<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="main.js" defer></script>

  <title>Timothy Adeyinka | Typing Speed Test</title>

</head>

<body>
  <header>
    <div class="header-top">
      <img src="assets/images/logo-small.svg" alt="project logo-small">

      <div class="p-best">
        <img src="assets/images/icon-personal-best.svg" alt="achievements">
        <span class="txt">Personal Best:</span>&nbsp;<span class="achieved">92 </span>WPM
      </div>
    </div>
    <div class="header-bottom">
      <div class="labels">
        <div>
          WPM:&nbsp;&nbsp;<span id="wpm">0</span>
        </div>
        <div>
          Accuracy:&nbsp;&nbsp;<span id="acc">100%</span>
        </div>
        <div>
          Time:&nbsp;&nbsp;<span id="timer">0:60</span>
        </div>
      </div>

      <div class="dropdown">
        <div class="radio diff">
          <!-- Filled by main.js -->
        </div>
        <p class="hidden">|</p>
        <div class="radio mode">
          <!-- Filled by main.js -->
        </div>
      </div>
    </div>
  </header>

  <main class="typing-container">
    <div id="typing-board" tabindex="0"></div>
    <input type="text" id="hidden-input" class="hidden" autocomplete="off">

    <div class="first-test-result hidden">
      <div class="images">
        <img src="assets/images/pattern-star-2.svg" alt="pattern-star-2" class="small">
        <img src="assets/images/icon-completed.svg" alt="green mark" class="main">
      </div>

      <h2 class="feedback-header">Baseline Established!</h2>
      <p class="feedback">You've set the bar. Now the real challenge begins--time to beat it.</p>

      <div class="result-details">
        <div>WPM: <br> <span class="result-achieved">85</span></div>
        <div>Accuracy: <br> <span class="result-acc">90%</span></div>
        <div>Characters <br> <span>
            <span class="result-correct correct">120</span> / <span class="result-incorrect incorrect">5</span>
          </span></div>
      </div>

      <div class="restart" onclick="restartTest();">Beat This Score
        <!-- default color of image is white;  -->
        <!-- <img src="assets/images/icon-restart.svg" alt="retry"> -->
      </div>
    </div>
  </main>

  <footer>
    <div class="restart" onclick="restartTest();">Restart Test&nbsp;&nbsp;<img src="assets/images/icon-restart.svg"
        alt="restart image"></div>
  </footer>

</body>

</html>
