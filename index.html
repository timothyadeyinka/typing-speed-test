<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="main.js" defer></script>

  <title>Timothy Adeyinka | Typing Speed Test</title>

</head>

<body>
  <header>
    <div class="header-top">
      <div class="left">
        <img src="assets/images/logo-small.svg" alt="project logo-small">
        <div class="txt">
          <h1>Typing Speed Test</h1>
          <p>Type as fast as you can in 60seconds</p>
        </div>

      </div>

      <div class="p-best">
        <img src="assets/images/icon-personal-best.svg" alt="achievements">
        <span class="txt">Personal Best:</span>&nbsp;<span class="achieved">92 WPM</span>
      </div>
    </div>
    <div class="header-bottom">
      <div class="labels">
        <span class="grey"></span>
      </div>
      <div>
        WPM: <span>0</span>
      </div>
      <div>
        Accuracy: <span>100%</span>
      </div>
      <div>
        Time: <span>0:60</span>
      </div>

      <div class="dropdown">
        <div class="radio diff">
          <div class="radio-button">Hard <img src="assets/images/icon-down-arrow.svg" alt="dropdown icon-down-arrow">
          </div>
          <div class="options">
            <form>
              <input type="radio" id="easy" name="easy" value="easy">
              <label for="easy">Easy</label>
              <input type="radio" id="medium" name="medium" value="medium">
              <label for="medium">Medium</label>
              <input type="radio" id="hard" name="hard" value="hard">
              <label for="hard">Hard</label>
            </form>
          </div>
        </div>
        <div class="radio mode">
          <div>Timed(60s) <img src="assets/images/icon-down-arrow.svg" alt="dropdown icon-down-arrow"></div>
          <div class="options">
            <form>
              <input type="radio" id="timed" name="timed" value="timed">
              <label for="timed">Timed (60s)</label>
              <input type="radio" id="passage" name="passage" value="passage">
              <label for="passage">Passage</label>
            </form>
          </div>
        </div>
      </div>
    </div>
  </header>

</body>

</html>
