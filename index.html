<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="main.js" defer></script>

  <title>Timothy Adeyinka | Typing Speed Test</title>

</head>

<body>
  <header>
    <div class="header-top">
      <img src="assets/images/logo-small.svg" alt="project logo-small">

      <div class="p-best">
        <img src="assets/images/icon-personal-best.svg" alt="achievements">
        <span class="txt">Personal Best:</span>&nbsp;<span class="achieved">92 WPM</span>
      </div>
    </div>
    <div class="header-bottom">
      <div class="labels">
        <div>
          WPM:&nbsp;&nbsp;<span>0</span>
        </div>
        <div>
          Accuracy:&nbsp;&nbsp;<span>100%</span>
        </div>
        <div>
          Time:&nbsp;&nbsp;<span>0:60</span>
        </div>
      </div>

      <div class="dropdown">
        <div class="radio diff">
          <!-- Filled by main.js -->
        </div>
        <p>|</p>
        <div class="radio mode">
          <!-- Filled by main.js -->
        </div>
      </div>
    </div>
  </header>

</body>

</html>
